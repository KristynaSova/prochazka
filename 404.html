<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stránka nenalezena – Jiří Miroslav Procházka</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&family=Montserrat:wght@400&display=swap&subset=latin,latin-ext" rel="stylesheet">
    <!-- Web Awesome (ikona) -->
    <link rel="stylesheet" href="https://early.webawesome.com/webawesome@2.0.0-alpha.10/dist/themes/default.css">
    <script type="module" src="https://early.webawesome.com/webawesome@2.0.0-alpha.10/dist/webawesome.loader.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display:    flex;
            flex-direction: column;
            align-items:   center;
            justify-content: center;
            text-align:    center;
            padding:       2rem var(--container-pad, 1.25rem);
            gap:           1.5rem;
        }

        .error-page__icon {
            font-size: clamp(4rem, 10vw, 6rem);
            color:     var(--color-primary, #4B0404);
            opacity:   0.6;
        }

        .error-page__title {
            font-family:  var(--font-heading, 'Jost', sans-serif);
            font-weight:  600;
            font-size:    clamp(1.5rem, 4vw, 2.5rem);
            color:        var(--color-text, #000000);
            line-height:  1.2;
        }

        .error-page__text {
            font-family: var(--font-body, 'Montserrat', sans-serif);
            font-size:   1rem;
            color:       var(--color-text-body, #333333);
            max-width:   480px;
        }

        .error-page__body {
            text-align: left;
        }

        .error-page__body .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.5rem;
            padding: 0.875rem 1.0625rem;
            font-family: 'Jost', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            line-height: 0.85;
            text-transform: uppercase;
            color: #FDCFCF;
            background-color: #4B0404;
            border: 2px solid #4B0404;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }

        .error-page__body .btn:hover {
            background-color: #FDCFCF;
            color: #4B0404;
            border-color: #FDCFCF;
        }
    </style>
</head>
<body>

    <main class="error-page" id="main-content">

        <div class="error-page__icon" aria-hidden="true">
            <wa-icon name="face-frown" variant="regular"></wa-icon>
        </div>

        <div class="error-page__body">
            <h1 class="error-page__title">Stránka nebyla nalezena</h1>

            <p class="error-page__text">
                Omlouváme se, stránka, kterou hledáte, neexistuje nebo byla přesunuta.
            </p>

            <a href="/" class="btn">Zpět na úvodní stránku</a>
        </div>

    </main>

</body>
</html>
